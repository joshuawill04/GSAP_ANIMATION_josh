<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Circular Card Stack</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #d8d8d8 0%, #bebebe 100%);
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .stack {
      position: relative;
      width: 320px;
      height: 760px;
      transform: translateY(10px);
    }

    .card {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 280px;
      height: 170px;
      border-radius: 18px;
      overflow: hidden;
      transform-origin: center center;
      box-shadow:
        0 18px 45px rgba(0,0,0,0.18),
        0 4px 10px rgba(0,0,0,0.08);
      will-change: transform, opacity;
      user-select: none;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 18px 18px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card.orange {
      background: linear-gradient(135deg, #ff5f3a 0%, #f04422 55%, #dd3517 100%);
      color: white;
    }

    .card.black {
      background: linear-gradient(180deg, #101115 0%, #0a0b0f 100%);
      color: white;
    }

    .card.white {
      background: linear-gradient(180deg, #f9f9f9 0%, #efefef 100%);
      color: #111;
    }

    .small-label {
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.72;
    }

    .headline {
      font-size: 30px;
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 700;
      max-width: 80%;
    }

    .giant {
      position: absolute;
      right: 16px;
      top: 10px;
      font-size: 96px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.08em;
      opacity: 0.92;
    }

    .rows {
      display: grid;
      gap: 6px;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .row {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 5px;
    }

    .white .row {
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: center;
      height: 100%;
    }

    .panel-lines {
      display: grid;
      gap: 10px;
    }

    .line {
      height: 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.08);
      width: 100%;
    }

    .line.short { width: 70%; }
    .line.mid { width: 82%; }

    .product-box {
      height: 110px;
      border-radius: 12px;
      background: linear-gradient(180deg, #202328 0%, #121418 100%);
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    .product {
      width: 58px;
      height: 92px;
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff 0%, #ececec 100%);
      box-shadow:
        0 10px 18px rgba(0,0,0,0.18),
        inset 0 0 0 1px rgba(0,0,0,0.06);
    }

    .avatar {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff7a00 0%, #ff3d00 100%);
      box-shadow: inset 0 0 0 6px rgba(0,0,0,0.18);
    }

    .swatches {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }

    .swatches span {
      width: 20px;
      height: 8px;
      border-radius: 999px;
      display: block;
      background: #fff;
      opacity: 0.85;
    }

    .swatches span:nth-child(1) { background: #ff8a64; }
    .swatches span:nth-child(2) { background: #ff6c3a; }
    .swatches span:nth-child(3) { background: #ffb199; }
    .swatches span:nth-child(4) { background: #fff0e8; }

    .footer-note {
      position: absolute;
      bottom: 18px;
      left: 20px;
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="stack">
      <div class="card orange">
        <div class="card-inner">
          <div class="small-label">Issue / 01</div>
          <div class="headline">Editorial Motion</div>
          <div class="giant">4</div>
          <div class="footer-note">Premium layout system</div>
        </div>
      </div>

      <div class="card black">
        <div class="card-inner">
          <div class="small-label">Project / Process</div>
          <div class="rows">
            <div class="row"><span>Discover</span><span>01</span></div>
            <div class="row"><span>Direction</span><span>02</span></div>
            <div class="row"><span>Design</span><span>03</span></div>
            <div class="row"><span>Delivery</span><span>04</span></div>
          </div>
          <div class="footer-note">Structured sequencing</div>
        </div>
      </div>

      <div class="card white">
        <div class="card-inner">
          <div class="small-label">Opportunity / Product</div>
          <div class="mini-grid">
            <div class="panel-lines">
              <div class="line"></div>
              <div class="line mid"></div>
              <div class="line short"></div>
            </div>
            <div class="product-box">
              <div class="product"></div>
            </div>
          </div>
          <div class="footer-note">Clean contrast handoff</div>
        </div>
      </div>

      <div class="card black">
        <div class="card-inner">
          <div class="small-label">Brand / Vision</div>
          <div class="mini-grid">
            <div class="avatar"></div>
            <div>
              <div style="font-size:10px; opacity:.7; text-transform:uppercase; letter-spacing:.14em;">Palette</div>
              <div class="swatches">
                <span></span><span></span><span></span><span></span>
              </div>
            </div>
          </div>
          <div class="footer-note">Identity card state</div>
        </div>
      </div>

      <div class="card orange">
        <div class="card-inner">
          <div class="small-label">Closing / Frame</div>
          <div class="headline">Motion System</div>
          <div style="font-size:58px; font-weight:700; letter-spacing:-0.07em; align-self:flex-end; opacity:.92;">05</div>
          <div class="footer-note">Loop-ready transition</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const cards = gsap.utils.toArray(".card");

    // Five visual slots arranged along a vertical circular arc.
    // These values are the whole trick.
    const slots = [
      { x: -28, y: -285, rotation: -18, scale: 0.96, opacity: 0.94, zIndex: 2 },
      { x:  18, y: -120, rotation: -9,  scale: 0.985, opacity: 0.98, zIndex: 3 },
      { x:   0, y:   55, rotation:  0,  scale: 1.03, opacity: 1,    zIndex: 5 },
      { x: -18, y:  225, rotation:  9,  scale: 0.985, opacity: 0.98, zIndex: 3 },
      { x:  28, y:  390, rotation: 18,  scale: 0.96, opacity: 0.94, zIndex: 2 }
    ];

    let order = [0, 1, 2, 3, 4];
    let isAnimating = false;

    function applySlots(animated = false) {
      order.forEach((cardIndex, slotIndex) => {
        const card = cards[cardIndex];
        const s = slots[slotIndex];

        gsap.set(card, { zIndex: s.zIndex });

        if (animated) {
          gsap.to(card, {
            xPercent: -50,
            yPercent: -50,
            x: s.x,
            y: s.y,
            rotation: s.rotation,
            scale: s.scale,
            opacity: s.opacity,
            duration: 1.25,
            ease: "power3.inOut"
          });
        } else {
          gsap.set(card, {
            xPercent: -50,
            yPercent: -50,
            x: s.x,
            y: s.y,
            rotation: s.rotation,
            scale: s.scale,
            opacity: s.opacity
          });
        }
      });
    }

    // Initial load with a subtle premium entrance
    function intro() {
      order.forEach((cardIndex, slotIndex) => {
        const card = cards[cardIndex];
        const s = slots[slotIndex];

        gsap.set(card, {
          xPercent: -50,
          yPercent: -50,
          x: s.x + 18,
          y: s.y + 42,
          rotation: s.rotation + 3,
          scale: s.scale * 0.96,
          opacity: 0
        });

        gsap.to(card, {
          x: s.x,
          y: s.y,
          rotation: s.rotation,
          scale: s.scale,
          opacity: s.opacity,
          duration: 1.1,
          delay: slotIndex * 0.08,
          ease: "power3.out"
        });

        gsap.set(card, { zIndex: s.zIndex });
      });
    }

    function nextCard() {
      if (isAnimating) return;
      isAnimating = true;

      // rotate order so each card moves to the next slot
      order.push(order.shift());

      const tl = gsap.timeline({
        defaults: { ease: "power3.inOut" },
        onComplete: () => {
          isAnimating = false;
        }
      });

      order.forEach((cardIndex, slotIndex) => {
        const card = cards[cardIndex];
        const s = slots[slotIndex];

        tl.set(card, { zIndex: s.zIndex }, 0);
        tl.to(card, {
          xPercent: -50,
          yPercent: -50,
          x: s.x,
          y: s.y,
          rotation: s.rotation,
          scale: s.scale,
          opacity: s.opacity,
          duration: 1.3
        }, 0);
      });

      // center card gets a very slight premium settle
      const centerCard = cards[order[2]];
      tl.fromTo(centerCard,
        { scale: slots[2].scale * 1.015 },
        {
          scale: slots[2].scale,
          duration: 0.7,
          ease: "power2.out"
        },
        0.58
      );
    }

    intro();

    // Auto loop
    gsap.delayedCall(2.4, function loop() {
      nextCard();
      gsap.delayedCall(2.2, loop);
    });

    // Optional click to advance manually
    document.addEventListener("click", nextCard);
  </script>
</body>
</html>
