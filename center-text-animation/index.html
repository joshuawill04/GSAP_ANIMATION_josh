<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radial Transition + Text Write</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      font-family: Inter, Arial, sans-serif;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03), transparent 45%),
        linear-gradient(180deg, #060606 0%, #000 100%);
    }

    .grain {
      position: absolute;
      inset: -20%;
      pointer-events: none;
      opacity: 0.12;
      background-image:
        radial-gradient(rgba(255,255,255,0.22) 0.5px, transparent 0.8px);
      background-size: 4px 4px;
      filter: blur(0.3px);
      mix-blend-mode: soft-light;
      animation: grainShift 5s steps(6) infinite;
    }

    @keyframes grainShift {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-1%, 1%); }
      50% { transform: translate(1%, -1%); }
      75% { transform: translate(0.5%, 1%); }
      100% { transform: translate(0, 0); }
    }

    .panel {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18vw;
      min-width: 120px;
      max-width: 220px;
      height: 72vh;
      transform: translate(-50%, -50%);
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.07),
        rgba(255,255,255,0.02)
      );
      border-left: 1px solid rgba(255,255,255,0.07);
      border-right: 1px solid rgba(255,255,255,0.05);
      opacity: 0;
      filter: blur(16px);
      z-index: 2;
    }

    .headline-wrap {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 4;
      pointer-events: none;
    }

    .headline {
      position: relative;
      margin: 0;
      color: rgba(255,255,255,0.94);
      font-size: clamp(34px, 6vw, 88px);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.05em;
      text-align: center;
      white-space: nowrap;
      filter: blur(12px);
      opacity: 0;
      transform: translateY(10px) scale(0.98);
      text-shadow:
        0 0 18px rgba(255,255,255,0.06),
        0 0 30px rgba(255,255,255,0.03);
    }

    .headline .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(18px);
      filter: blur(10px);
      will-change: transform, opacity, filter;
    }

    .orb {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.2);
      z-index: 5;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 50%,
          rgba(255,255,255,0.98) 0%,
          rgba(255,255,255,0.92) 24%,
          rgba(255,255,255,0.50) 46%,
          rgba(255,255,255,0.18) 64%,
          rgba(255,255,255,0.03) 78%,
          rgba(255,255,255,0.00) 100%);
      filter: blur(8px);
      opacity: 0;
      mix-blend-mode: screen;
      box-shadow:
        0 0 30px rgba(255,255,255,0.45),
        0 0 80px rgba(255,255,255,0.20),
        0 0 120px rgba(255,255,255,0.10);
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background:
        radial-gradient(circle at center,
          rgba(0,0,0,0) 40%,
          rgba(0,0,0,0.22) 72%,
          rgba(0,0,0,0.58) 100%);
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="grain"></div>
    <div class="panel"></div>

    <div class="headline-wrap">
      <h1 class="headline" id="headline">It’s about perfect</h1>
    </div>

    <div class="orb"></div>
    <div class="vignette"></div>
  </div>

  <script>
    const textEl = document.getElementById("headline");
    const originalText = textEl.textContent;
    textEl.innerHTML = "";

    for (const char of originalText) {
      const span = document.createElement("span");
      span.className = "char";
      span.textContent = char === " " ? "\u00A0" : char;
      textEl.appendChild(span);
    }

    const chars = textEl.querySelectorAll(".char");
    const orb = document.querySelector(".orb");
    const panel = document.querySelector(".panel");

    const tl = gsap.timeline({
      defaults: { ease: "power3.out" }
    });

    tl
      .to(panel, {
        opacity: 0.8,
        filter: "blur(4px)",
        duration: 0.55,
        ease: "power2.out"
      }, 0)

      .to(orb, {
        opacity: 1,
        scale: 0.8,
        duration: 0.24,
        ease: "power2.out"
      }, 0.08)

      .to(orb, {
        scale: 5.8,
        width: 68,
        height: 68,
        filter: "blur(16px)",
        duration: 0.9,
        ease: "expo.out"
      }, 0.18)

      .to(textEl, {
        opacity: 1,
        filter: "blur(0px)",
        y: 0,
        scale: 1,
        duration: 0.55,
        ease: "power2.out"
      }, 0.42)

      .to(chars, {
        opacity: 1,
        y: 0,
        filter: "blur(0px)",
        duration: 0.55,
        stagger: 0.028,
        ease: "power3.out"
      }, 0.48)

      .to(orb, {
        opacity: 0.72,
        scale: 4.9,
        duration: 0.7,
        ease: "sine.out"
      }, 1.0)

      .to(panel, {
        opacity: 0.34,
        filter: "blur(10px)",
        duration: 0.8,
        ease: "sine.out"
      }, 1.05);

    gsap.to(orb, {
      scale: 5.2,
      duration: 2.8,
      yoyo: true,
      repeat: -1,
      ease: "sine.inOut"
    });

    gsap.to(panel, {
      y: "-=8",
      duration: 3.6,
      yoyo: true,
      repeat: -1,
      ease: "sine.inOut"
    });

    gsap.to(textEl, {
      textShadow: "0 0 14px rgba(255,255,255,0.10)",
      duration: 2.4,
      yoyo: true,
      repeat: -1,
      ease: "sine.inOut"
    });
  </script>
</body>
</html>
