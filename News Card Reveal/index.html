<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Card Reveal</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050505;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .scene {
      position: relative;
      width: 430px;
      height: 540px;
      background: #070707;
      overflow: hidden;
      isolation: isolate;
    }

    .card-shell {
      position: absolute;
      inset: 16px;
      border-radius: 34px;
      overflow: hidden;
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.06),
          rgba(255,255,255,0.015)
        );
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 18px 44px rgba(0,0,0,0.34);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      opacity: 0;
      transform: scale(0.94) translateY(24px);
      z-index: 2;
    }

    .news-bg {
      position: absolute;
      top: 24px;
      left: 28px;
      right: 28px;
      z-index: 1;
      display: flex;
      justify-content: center;
      pointer-events: none;
      overflow: hidden;
    }

    .news-word {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 5.2rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.88);

      text-shadow:
        0 0 18px rgba(255,255,255,0.12),
        0 0 32px rgba(255,255,255,0.06);

      opacity: 0;
      filter: blur(12px);
      transform: translateY(20px);
    }

    .red-accent-left,
    .red-accent-right {
      position: absolute;
      top: 68px;
      bottom: 52px;
      width: 12px;
      border-radius: 999px;

      background:
        linear-gradient(
          180deg,
          rgba(255,30,30,0),
          rgba(255,40,40,0.9),
          rgba(120,0,0,0.22)
        );

      filter: blur(10px);
      opacity: 0;
      z-index: 2;
      pointer-events: none;
    }

    .red-accent-left {
      left: 26px;
    }

    .red-accent-right {
      right: 26px;
    }

    .principal-asset-wrap {
      position: absolute;
      inset: 68px 34px 28px 34px;
      z-index: 3;

      opacity: 0;
      transform: translateY(38px) scale(1.04);
      filter: blur(16px);
      transform-origin: center bottom;
    }

    .principal-asset {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 24px;

      user-select: none;
      -webkit-user-drag: none;
    }

    .top-shine {
      position: absolute;
      top: 0;
      left: -10%;
      width: 120%;
      height: 90px;

      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.22) 0%,
          rgba(255,255,255,0.08) 26%,
          rgba(255,255,255,0) 100%
        );

      filter: blur(14px);
      opacity: 0;
      z-index: 4;
      pointer-events: none;
    }

    .bottom-shadow {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 38%;

      background:
        linear-gradient(
          180deg,
          rgba(0,0,0,0) 0%,
          rgba(0,0,0,0.18) 40%,
          rgba(0,0,0,0.42) 100%
        );

      z-index: 4;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,80,80,0.86);
      filter: blur(1px);
      opacity: 0;
      z-index: 5;
      pointer-events: none;
    }

    .p1 {
      width: 8px;
      height: 8px;
      top: 112px;
      left: 46px;
    }

    .p2 {
      width: 6px;
      height: 6px;
      top: 170px;
      right: 64px;
    }

    .p3 {
      width: 10px;
      height: 10px;
      bottom: 136px;
      left: 56px;
    }

    .p4 {
      width: 7px;
      height: 7px;
      bottom: 112px;
      right: 42px;
    }

    .p5 {
      width: 5px;
      height: 5px;
      top: 72px;
      right: 116px;
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      opacity: 0.05;

      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.02) 0px,
          rgba(255,255,255,0.02) 1px,
          transparent 1px,
          transparent 3px
        );
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;

      background:
        radial-gradient(
          circle at center,
          transparent 38%,
          rgba(0,0,0,0.18) 72%,
          rgba(0,0,0,0.48) 100%
        );
    }
  </style>
</head>
<body>

<div class="scene">

  <div class="news-bg">
    <div class="news-word">NEWS</div>
  </div>

  <div class="red-accent-left"></div>
  <div class="red-accent-right"></div>

  <div class="card-shell"></div>

  <!-- WORKING CODEPEN IMAGE -->
  <div class="principal-asset-wrap">
    <img
      class="principal-asset"
      src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=900&q=80"
      alt="News reader asset"
    />

    <div class="top-shine"></div>
    <div class="bottom-shadow"></div>
  </div>

  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>

  <div class="vignette"></div>
  <div class="grain"></div>

</div>

<script>
const tl = gsap.timeline({
  defaults: {
    ease: "power3.out"
  }
});

tl.to(".card-shell", {
  opacity: 1,
  scale: 1,
  y: 0,
  duration: 0.72,
  ease: "power4.out"
});

tl.to(".news-word", {
  opacity: 1,
  filter: "blur(0px)",
  y: 0,
  duration: 0.58,
  ease: "power4.out"
}, "-=0.34");

tl.to(".principal-asset-wrap", {
  opacity: 1,
  y: 0,
  scale: 1,
  filter: "blur(0px)",
  duration: 1.02,
  ease: "power4.out"
}, "-=0.18");

tl.to(".red-accent-left, .red-accent-right", {
  opacity: 1,
  duration: 0.42,
  stagger: 0.04,
  ease: "power2.out"
}, "-=0.60");

tl.to(".top-shine", {
  opacity: 1,
  duration: 0.36,
  ease: "power2.out"
}, "-=0.52");

tl.to(".particle", {
  opacity: 0.85,
  duration: 0.3,
  stagger: 0.05,
  ease: "power2.out"
}, "-=0.40");

tl.to(".principal-asset-wrap", {
  y: -6,
  duration: 0.18,
  ease: "power1.out"
}, ">-0.08");

tl.to(".principal-asset-wrap", {
  y: 0,
  duration: 0.24,
  ease: "power2.out"
});

gsap.to(".principal-asset-wrap", {
  y: -4,
  duration: 2.8,
  repeat: -1,
  yoyo: true,
  ease: "sine.inOut"
});

gsap.to(".top-shine", {
  x: 18,
  opacity: 0.75,
  duration: 2.4,
  repeat: -1,
  yoyo: true,
  ease: "sine.inOut"
});

gsap.to(".particle", {
  y: -10,
  duration: 2.4,
  repeat: -1,
  yoyo: true,
  ease: "sine.inOut",
  stagger: 0.12
});

gsap.to(".grain", {
  opacity: 0.08,
  duration: 0.45,
  repeat: -1,
  yoyo: true,
  ease: "sine.inOut"
});
</script>

</body>
</html>
